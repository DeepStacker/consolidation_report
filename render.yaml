services:
  - type: web
    name: consolidation-pipeline
    env: python
    buildCommand: "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: "uvicorn src.web_api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
