client_id: "rbl_gold_loan"
client_display_name: "RBL Bank Gold Loan Tracker"
filename_pattern: "*RBL*Gold Loan*"
active: true

sheets:
  "Master Data":
    header_row: 1
    data_start_row: 2
    columns:
      - canonical_name: "Sr No"
        synonyms: ["Sr No.", "Sr No"]
        datatype: "integer"
        mandatory: true
        
      - canonical_name: "Client"
        datatype: "string"
        default_value: "RBL(muthoot)" # Appends under RBL muthoot tag
        
      - canonical_name: "BRANCH"
        synonyms: ["BranchName", "Branch Name", "BRANCH"]
        datatype: "string"
        mandatory: true
        
      - canonical_name: "SOL ID"
        synonyms: ["Branch Code"]
        datatype: "string"
        default_value: null # Gold Loan branches have null SOL IDs (HR-004)
        mandatory: false
        
      - canonical_name: "Assayer Code"
        synonyms: ["Assayer Code"]
        datatype: "string"
        validation_regex: "^AS[0-9]{4}$|^AD[0-9]{4}$"
        mandatory: true
        
      - canonical_name: "Total pay"
        synonyms: ["Total", "Total pay"]
        datatype: "decimal"
        default_value: 0.0
        mandatory: false
